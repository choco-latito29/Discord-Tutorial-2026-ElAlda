name: Community Greeter

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greet:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "👋 Welcome to the project! Thank you for opening your first issue. A maintainer will review it as soon as possible. Please ensure you have provided all the necessary details."
          pr-message: "🚀 Awesome! Thank you for your first Pull Request. We appreciate your contribution. A maintainer will review your code shortly. Please make sure you've read our Contributing Guidelines!"
